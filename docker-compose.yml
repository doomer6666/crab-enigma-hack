services:
  db:
    image: postgres:15
    container_name: jarvis_postgres
    environment:
      POSTGRES_DB: jarvis_db
      POSTGRES_USER: jarvis_user
      POSTGRES_PASSWORD: jarvis_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis_user -d jarvis_db"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  backend:
    build: ./backend
    container_name: jarvis_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://jarvis_user:jarvis_password@db:5432/jarvis_db
      - DJANGO_ALLOWED_HOSTS=*
    volumes:
      - static_volume:/app/static
      - jarvis_models:/jarvis

  frontend:
    build: ./frontend
    container_name: jarvis_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - db
    volumes:
      - static_volume:/app/static


volumes:
  postgres_data:
  static_volume:
  jarvis_models: