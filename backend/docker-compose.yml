version: '3.8'

services:
  db:
    image: postgres:15
    container_name: jarvis_postgres
    environment:
      POSTGRES_DB: jarvis_db
      POSTGRES_USER: jarvis_user
      POSTGRES_PASSWORD: jarvis_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: